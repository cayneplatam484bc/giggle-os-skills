<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Giggle Science</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      background: #0d1b2a;
      color: #fff;
    }

    #sim-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #info-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(13, 27, 42, 0.95);
      border-top: 2px solid #1b4965;
      padding: 16px 20px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 10;
      max-height: 40%;
      overflow-y: auto;
    }

    #info-panel.visible {
      transform: translateY(0);
    }

    #info-panel h2 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #5bc0be;
    }

    #info-panel p {
      font-size: 20px;
      line-height: 1.5;
      color: #ccc;
    }

    #close-info {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 24px;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      width: 44px;
      height: 44px;
    }

    #title {
      position: fixed;
      top: 12px;
      left: 16px;
      font-size: 24px;
      color: #5bc0be;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="title">🔬 Science Title</div>
  <canvas id="sim-canvas"></canvas>

  <div id="info-panel">
    <button id="close-info" onclick="hideInfo()">✕</button>
    <h2 id="info-title"></h2>
    <p id="info-text"></p>
  </div>

  <script>
    const canvas = document.getElementById('sim-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Info Panel ---
    function showInfo(title, text) {
      document.getElementById('info-title').textContent = title;
      document.getElementById('info-text').textContent = text;
      document.getElementById('info-panel').classList.add('visible');
    }

    function hideInfo() {
      document.getElementById('info-panel').classList.remove('visible');
    }

    // --- Interactive Objects ---
    // Each object: { x, y, radius, emoji, label, fact }
    const objects = [];

    function addObject(x, y, radius, emoji, label, fact) {
      objects.push({ x, y, radius, emoji, label, fact });
    }

    // --- Touch Detection ---
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const tx = e.touches[0].clientX;
      const ty = e.touches[0].clientY;

      for (const obj of objects) {
        const dx = tx - obj.x;
        const dy = ty - obj.y;
        if (dx * dx + dy * dy < obj.radius * obj.radius) {
          showInfo(obj.label, obj.fact);
          return;
        }
      }
      hideInfo();
    }, { passive: false });

    // --- Render ---
    function draw() {
      ctx.clearRect(0, 0, W, H);

      objects.forEach(obj => {
        // Emoji
        ctx.font = `${obj.radius * 1.5}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(obj.emoji, obj.x, obj.y);

        // Label
        ctx.font = '16px sans-serif';
        ctx.fillStyle = '#aaa';
        ctx.fillText(obj.label, obj.x, obj.y + obj.radius + 14);
        ctx.fillStyle = '#fff';
      });

      requestAnimationFrame(draw);
    }

    // TODO: Add science objects and start simulation
    // Example:
    // addObject(W/2, H/2, 40, '🌍', 'Earth', 'Earth is the third planet from the Sun.');
    draw();
  </script>
</body>
</html>
