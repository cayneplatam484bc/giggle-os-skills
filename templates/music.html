<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Giggle Music</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      background: #1a1a2e;
      color: #fff;
    }

    #instrument {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    #pads {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 500px;
      width: 100%;
    }

    .pad {
      aspect-ratio: 1;
      border: none;
      border-radius: 16px;
      font-size: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.05s, filter 0.05s;
      min-width: 48px;
      min-height: 48px;
    }

    .pad:active, .pad.active {
      transform: scale(0.9);
      filter: brightness(1.4);
    }

    #controls {
      margin-top: 20px;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .control-btn {
      font-size: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: #333;
      color: #fff;
      cursor: pointer;
      min-height: 48px;
    }
  </style>
</head>
<body>
  <div id="instrument">
    <h1>🎵 Music Title</h1>
    <div id="pads"></div>
    <div id="controls">
      <!-- tempo, play/stop, etc. -->
    </div>
  </div>

  <script>
    // --- Audio Engine ---
    let audioCtx;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playNote(freq, duration = 0.3, type = 'sine') {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;

      // Envelope: attack, decay, sustain, release
      const now = ctx.currentTime;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.4, now + 0.01);   // attack
      gain.gain.linearRampToValueAtTime(0.3, now + 0.1);    // decay to sustain
      gain.gain.linearRampToValueAtTime(0, now + duration);  // release

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + duration);
    }

    function playNoise(duration = 0.1) {
      const ctx = getAudioCtx();
      const bufferSize = ctx.sampleRate * duration;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

      const source = ctx.createBufferSource();
      const gain = ctx.createGain();
      source.buffer = buffer;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      source.connect(gain);
      gain.connect(ctx.destination);
      source.start();
    }

    // --- Equal Temperament Note Frequencies ---
    function noteFreq(semitone) {
      // semitone 0 = A4 (440Hz), positive = higher
      return 440 * Math.pow(2, semitone / 12);
    }

    // --- Rainbow Colors ---
    const COLORS = [
      '#FF0000', '#FF7700', '#FFDD00', '#00CC00',
      '#0088FF', '#0000FF', '#8800FF', '#FF00FF',
      '#FF4444', '#FFAA00', '#AAFF00', '#00FFAA',
      '#00AAFF', '#4400FF', '#AA00FF', '#FF0088'
    ];

    // --- Pad Setup ---
    // TODO: Configure pads with sounds and colors
    const padsDiv = document.getElementById('pads');

    function createPad(index, color, label, onTap) {
      const pad = document.createElement('button');
      pad.className = 'pad';
      pad.style.background = color;
      pad.textContent = label;

      pad.addEventListener('touchstart', e => {
        e.preventDefault();
        pad.classList.add('active');
        onTap();
      }, { passive: false });

      pad.addEventListener('touchend', () => pad.classList.remove('active'));
      padsDiv.appendChild(pad);
    }

    // TODO: Initialize instrument pads
  </script>
</body>
</html>
