<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Dice Roller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    h1 { font-size: 36px; margin-bottom: 16px; }
    #dice-area {
      display: flex; gap: 16px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 32px;
    }
    .die {
      width: 100px; height: 100px;
      background: #fff; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; font-weight: bold; color: #333;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: transform 0.1s;
    }
    .die.rolling { animation: shake 0.1s infinite; }
    @keyframes shake {
      0% { transform: rotate(-5deg) scale(1.05); }
      50% { transform: rotate(5deg) scale(0.95); }
      100% { transform: rotate(-5deg) scale(1.05); }
    }
    #roll-btn {
      font-size: 28px; padding: 18px 60px;
      border: none; border-radius: 20px;
      background: #FF6B6B; color: #fff;
      cursor: pointer; margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(255,107,107,0.4);
      min-height: 64px;
    }
    #roll-btn:active { transform: scale(0.95); }
    #controls {
      display: flex; gap: 12px; flex-wrap: wrap;
      justify-content: center;
    }
    .opt {
      font-size: 18px; padding: 10px 20px;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 12px; background: rgba(255,255,255,0.1);
      color: #fff; cursor: pointer; min-height: 48px;
    }
    .opt.on { background: rgba(255,255,255,0.3); border-color: #fff; }
    #total { font-size: 24px; margin-top: 12px; opacity: 0.8; }
  </style>
</head>
<body>
  <div id="app">
    <h1>🎲 Dice Roller</h1>
    <div id="dice-area"></div>
    <button id="roll-btn">🎲 Roll!</button>
    <div id="total"></div>
    <div id="controls"></div>
  </div>
  <script>
    let audioCtx;
    function ac() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
    function beep(f, d = 0.08) {
      const c = ac(), o = c.createOscillator(), g = c.createGain();
      o.type = 'square'; o.frequency.value = f;
      g.gain.setValueAtTime(0.1, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
      o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + d);
    }

    let numDice = 2, sides = 6, rolling = false;
    const diceEmoji = { 1: '⚀', 2: '⚁', 3: '⚂', 4: '⚃', 5: '⚄', 6: '⚅' };

    function renderDice(values) {
      const area = document.getElementById('dice-area');
      area.innerHTML = '';
      values.forEach(v => {
        const d = document.createElement('div');
        d.className = 'die';
        d.textContent = sides === 6 && diceEmoji[v] ? diceEmoji[v] : v;
        area.appendChild(d);
      });
      const total = values.reduce((a, b) => a + b, 0);
      document.getElementById('total').textContent = values.length > 1 ? `Total: ${total}` : '';
    }

    function roll() {
      if (rolling) return;
      rolling = true;
      const area = document.getElementById('dice-area');
      let count = 0;
      const maxCount = 12;

      function tick() {
        const vals = [];
        for (let i = 0; i < numDice; i++) vals.push(Math.floor(Math.random() * sides) + 1);
        renderDice(vals);
        area.querySelectorAll('.die').forEach(d => d.classList.add('rolling'));
        beep(300 + count * 40);
        count++;
        if (count < maxCount) {
          setTimeout(tick, 60 + count * 10);
        } else {
          area.querySelectorAll('.die').forEach(d => d.classList.remove('rolling'));
          beep(880, 0.15);
          rolling = false;
        }
      }
      tick();
    }

    function buildControls() {
      const ctrl = document.getElementById('controls');
      ctrl.innerHTML = '';
      // Num dice
      [1, 2, 3, 4].forEach(n => {
        const b = document.createElement('button');
        b.className = 'opt' + (n === numDice ? ' on' : '');
        b.textContent = n + (n === 1 ? ' die' : ' dice');
        b.onclick = () => { numDice = n; buildControls(); renderDice(Array(n).fill(sides === 6 ? '⚀' : '?').map(() => 1)); };
        ctrl.appendChild(b);
      });
      // Sides
      [6, 8, 10, 20].forEach(s => {
        const b = document.createElement('button');
        b.className = 'opt' + (s === sides ? ' on' : '');
        b.textContent = 'd' + s;
        b.onclick = () => { sides = s; buildControls(); };
        ctrl.appendChild(b);
      });
    }

    document.getElementById('roll-btn').addEventListener('touchstart', e => { e.preventDefault(); roll(); }, { passive: false });
    document.getElementById('roll-btn').addEventListener('click', roll);

    buildControls();
    renderDice([1, 1]);
  </script>
</body>
</html>
