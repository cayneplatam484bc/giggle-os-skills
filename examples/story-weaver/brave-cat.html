<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>The Brave Cat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    #scene {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      transition: background-color 0.6s ease;
    }
    #emoji { font-size: 80px; margin-bottom: 20px; text-align: center; }
    #text { font-size: 24px; line-height: 1.6; text-align: center; max-width: 560px; margin-bottom: 32px; color: #333; }
    #choices { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 380px; }
    .choice { font-size: 22px; padding: 16px 20px; border: none; border-radius: 16px; color: #fff; cursor: pointer; min-height: 56px; transition: transform 0.1s; }
    .choice:active { transform: scale(0.95); }
    .c1 { background: #4CAF50; } .c2 { background: #2196F3; } .c3 { background: #FF9800; }
  </style>
</head>
<body>
  <div id="scene">
    <div id="emoji"></div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>
  <script>
    const S = {
      start: {
        e: '🐱🏠', t: 'Once upon a time, there was a little cat named Whiskers who lived in a cozy house. One morning, Whiskers heard a strange sound outside...', bg: '#FFF8E1',
        c: [{ t: '🚪 Open the door and look', n: 'door' }, { t: '🪟 Peek through the window', n: 'window' }]
      },
      door: {
        e: '🐱🌳🐦', t: 'Whiskers opened the door and found a baby bird on the ground! The little bird had fallen from its nest in the big tree.', bg: '#E8F5E9',
        c: [{ t: '🌳 Help the bird back to its nest', n: 'help_bird' }, { t: '🥣 Give the bird some food first', n: 'feed_bird' }]
      },
      window: {
        e: '🐱🪟🌧️', t: 'Whiskers peeked through the window and saw it was raining! A tiny kitten was shivering under a bush outside.', bg: '#E3F2FD',
        c: [{ t: '☂️ Bring an umbrella and help', n: 'umbrella' }, { t: '🧣 Get a warm blanket', n: 'blanket' }]
      },
      help_bird: {
        e: '🐱🌳🐦🪺', t: 'Whiskers carefully climbed the tree and placed the baby bird back in its nest. Mama bird sang a beautiful song to say thank you!', bg: '#C8E6C9',
        c: [{ t: '🎵 Listen to the song', n: 'end_bird' }]
      },
      feed_bird: {
        e: '🐱🐦🥣', t: 'Whiskers brought some breadcrumbs. The baby bird ate happily and chirped with joy! Then Whiskers helped it fly back up to the nest.', bg: '#DCEDC8',
        c: [{ t: '✨ What happened next?', n: 'end_bird' }]
      },
      umbrella: {
        e: '🐱☂️🐈', t: 'Whiskers brought a big umbrella and walked the tiny kitten home. They became the best of friends and played together every day!', bg: '#BBDEFB',
        c: [{ t: '🌟 The End!', n: 'end_kitten' }]
      },
      blanket: {
        e: '🐱🧣🐈', t: 'Whiskers wrapped the kitten in a warm blanket and brought it inside. They curled up together by the fireplace, warm and safe.', bg: '#C5CAE9',
        c: [{ t: '🌟 The End!', n: 'end_kitten' }]
      },
      end_bird: {
        e: '🐱🐦🌈⭐', t: 'From that day on, the bird would visit Whiskers every morning and sing. Whiskers learned that being brave and kind always leads to wonderful friendships!', bg: '#FFF9C4',
        c: [{ t: '🔄 Read Again', n: 'start' }]
      },
      end_kitten: {
        e: '🐱🐈❤️⭐', t: 'Whiskers and the tiny kitten became the best of friends forever. They went on many adventures together! Whiskers learned that being brave and helping others makes the world a happier place.', bg: '#F3E5F5',
        c: [{ t: '🔄 Read Again', n: 'start' }]
      }
    };

    function show(id) {
      const s = S[id]; if (!s) return;
      document.getElementById('scene').style.backgroundColor = s.bg;
      document.getElementById('emoji').textContent = s.e;
      document.getElementById('text').textContent = s.t;
      const ch = document.getElementById('choices');
      ch.innerHTML = '';
      s.c.forEach((c, i) => {
        const b = document.createElement('button');
        b.className = 'choice c' + (i + 1);
        b.textContent = c.t;
        b.onclick = () => show(c.n);
        ch.appendChild(b);
      });
    }
    show('start');
  </script>
</body>
</html>
