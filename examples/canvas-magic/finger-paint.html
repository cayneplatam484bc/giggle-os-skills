<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Finger Paint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      background: #f5f5f5;
    }
    canvas { display: block; background: #fff; cursor: crosshair; }
    #tb {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; background: rgba(255,255,255,0.95);
      border-top: 2px solid #ddd; overflow-x: auto; z-index: 10;
    }
    .sw { width: 44px; height: 44px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; flex-shrink: 0; }
    .sw.on { border-color: #333; transform: scale(1.15); }
    .sz { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #aaa; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sz.on { border-color: #333; background: #eee; }
    .dot { border-radius: 50%; background: #333; }
    .tb { min-width: 44px; height: 44px; border: none; border-radius: 10px; background: #eee; font-size: 20px; cursor: pointer; flex-shrink: 0; padding: 0 10px; }
    .tb:active { background: #ddd; }
    .sep { width: 2px; height: 28px; background: #ddd; flex-shrink: 0; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="tb"></div>
  <script>
    const cv = document.getElementById('c'), cx = cv.getContext('2d');
    const TBH = 60;
    let W, H;
    function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight - TBH; cx.fillStyle = '#fff'; cx.fillRect(0, 0, W, H); }
    addEventListener('resize', resize); resize();

    let col = '#333', sz = 8, drawing = false, lx, ly, undo = [];

    function save() { if (undo.length > 20) undo.shift(); undo.push(cv.toDataURL()); }
    function undoLast() {
      if (!undo.length) return;
      const img = new Image();
      img.onload = () => { cx.clearRect(0, 0, W, H); cx.drawImage(img, 0, 0); };
      img.src = undo.pop();
    }

    cx.lineCap = 'round'; cx.lineJoin = 'round';

    cv.addEventListener('touchstart', e => {
      e.preventDefault(); save(); drawing = true;
      lx = e.touches[0].clientX; ly = e.touches[0].clientY;
      cx.beginPath(); cx.arc(lx, ly, sz / 2, 0, Math.PI * 2);
      cx.fillStyle = col; cx.fill();
    }, { passive: false });

    cv.addEventListener('touchmove', e => {
      e.preventDefault(); if (!drawing) return;
      const t = e.touches[0];
      cx.beginPath(); cx.moveTo(lx, ly); cx.lineTo(t.clientX, t.clientY);
      cx.strokeStyle = col; cx.lineWidth = sz; cx.stroke();
      lx = t.clientX; ly = t.clientY;
    }, { passive: false });

    cv.addEventListener('touchend', () => drawing = false);

    // Mouse fallback
    cv.addEventListener('mousedown', e => { save(); drawing = true; lx = e.clientX; ly = e.clientY; cx.beginPath(); cx.arc(lx, ly, sz / 2, 0, Math.PI * 2); cx.fillStyle = col; cx.fill(); });
    cv.addEventListener('mousemove', e => { if (!drawing) return; cx.beginPath(); cx.moveTo(lx, ly); cx.lineTo(e.clientX, e.clientY); cx.strokeStyle = col; cx.lineWidth = sz; cx.stroke(); lx = e.clientX; ly = e.clientY; });
    cv.addEventListener('mouseup', () => drawing = false);

    const COLORS = ['#000','#FF0000','#FF7700','#FFDD00','#00CC00','#0088FF','#8800FF','#FF69B4','#8B4513','#FFFFFF'];
    const SIZES = [4, 8, 16, 24, 36];

    function build() {
      const tb = document.getElementById('tb'); tb.innerHTML = '';
      COLORS.forEach(c => {
        const b = document.createElement('button'); b.className = 'sw' + (c === col ? ' on' : '');
        b.style.background = c; if (c === '#FFFFFF') b.style.border = '3px solid #ccc';
        b.onpointerdown = e => { e.preventDefault(); col = c; build(); };
        tb.appendChild(b);
      });
      tb.appendChild(Object.assign(document.createElement('div'), { className: 'sep' }));
      SIZES.forEach(s => {
        const b = document.createElement('button'); b.className = 'sz' + (s === sz ? ' on' : '');
        const d = document.createElement('div'); d.className = 'dot';
        const r = Math.min(s, 28); d.style.width = r + 'px'; d.style.height = r + 'px';
        b.appendChild(d);
        b.onpointerdown = e => { e.preventDefault(); sz = s; build(); };
        tb.appendChild(b);
      });
      tb.appendChild(Object.assign(document.createElement('div'), { className: 'sep' }));
      const ub = document.createElement('button'); ub.className = 'tb'; ub.textContent = '↩️';
      ub.onpointerdown = e => { e.preventDefault(); undoLast(); }; tb.appendChild(ub);
      const cb = document.createElement('button'); cb.className = 'tb'; cb.textContent = '🗑️';
      cb.onpointerdown = e => { e.preventDefault(); save(); cx.fillStyle = '#fff'; cx.fillRect(0, 0, W, H); }; tb.appendChild(cb);
    }
    build();
  </script>
</body>
</html>
