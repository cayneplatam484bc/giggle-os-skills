<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      background: #0a0a2a;
      color: #fff;
    }
    canvas { display: block; }
    #info {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,10,42,0.95); border-top: 2px solid #1b4965;
      padding: 16px 20px; transform: translateY(100%);
      transition: transform 0.3s ease; z-index: 10;
    }
    #info.show { transform: translateY(0); }
    #info h2 { font-size: 26px; margin-bottom: 6px; color: #5bc0be; }
    #info p { font-size: 20px; line-height: 1.5; color: #ccc; }
    #close { position: absolute; top: 8px; right: 12px; font-size: 24px; background: none; border: none; color: #fff; cursor: pointer; width: 44px; height: 44px; }
    #title { position: fixed; top: 10px; left: 16px; font-size: 22px; color: #5bc0be; z-index: 5; }
    #hint { position: fixed; top: 10px; right: 16px; font-size: 16px; color: #666; z-index: 5; }
  </style>
</head>
<body>
  <div id="title">🌌 Solar System</div>
  <div id="hint">Tap a planet!</div>
  <canvas id="c"></canvas>
  <div id="info">
    <button id="close" onclick="document.getElementById('info').classList.remove('show')">✕</button>
    <h2 id="iname"></h2>
    <p id="ifact"></p>
  </div>
  <script>
    const cv = document.getElementById('c'), cx = cv.getContext('2d');
    let W, H, cX, cY;
    function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; cX = W / 2; cY = H / 2; }
    addEventListener('resize', resize); resize();

    const planets = [
      { name: 'Sun', e: '☀️', r: 0, size: 40, speed: 0, angle: 0, fact: 'The Sun is a giant ball of hot gas. It is so big that 1.3 million Earths could fit inside it!' },
      { name: 'Mercury', e: '🟤', r: 55, size: 12, speed: 0.04, angle: 0, fact: 'Mercury is the closest planet to the Sun. It is very small and very hot during the day!' },
      { name: 'Venus', e: '🟡', r: 80, size: 16, speed: 0.03, angle: 1, fact: 'Venus is the hottest planet! It is covered in thick clouds and spins backwards.' },
      { name: 'Earth', e: '🌍', r: 110, size: 16, speed: 0.02, angle: 2, fact: 'Earth is our home! It is the only planet we know that has life, water, and air to breathe.' },
      { name: 'Mars', e: '🔴', r: 140, size: 14, speed: 0.015, angle: 3, fact: 'Mars is called the Red Planet. It has the tallest volcano in the solar system!' },
      { name: 'Jupiter', e: '🟠', r: 185, size: 28, speed: 0.008, angle: 4, fact: 'Jupiter is the biggest planet! It has a giant storm called the Great Red Spot that is bigger than Earth.' },
      { name: 'Saturn', e: '🪐', r: 230, size: 24, speed: 0.006, angle: 5, fact: 'Saturn has beautiful rings made of ice and rock. It is so light it could float in water!' },
    ];

    function draw() {
      cx.fillStyle = '#0a0a2a';
      cx.fillRect(0, 0, W, H);

      // Stars
      cx.fillStyle = '#ffffff22';
      for (let i = 0; i < 80; i++) {
        const sx = (Math.sin(i * 127.1) * 0.5 + 0.5) * W;
        const sy = (Math.cos(i * 311.7) * 0.5 + 0.5) * H;
        cx.beginPath(); cx.arc(sx, sy, 1, 0, Math.PI * 2); cx.fill();
      }

      // Orbits
      cx.strokeStyle = '#ffffff15';
      cx.lineWidth = 1;
      planets.forEach(p => {
        if (p.r === 0) return;
        cx.beginPath(); cx.arc(cX, cY, p.r, 0, Math.PI * 2); cx.stroke();
      });

      // Planets
      planets.forEach(p => {
        p.angle += p.speed;
        p.x = cX + Math.cos(p.angle) * p.r;
        p.y = cY + Math.sin(p.angle) * p.r;
        cx.font = p.size + 'px serif';
        cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText(p.e, p.x, p.y);
        // Label
        cx.font = '12px sans-serif';
        cx.fillStyle = '#888';
        cx.fillText(p.name, p.x, p.y + p.size / 2 + 12);
        cx.fillStyle = '#fff';
      });

      requestAnimationFrame(draw);
    }

    cv.addEventListener('touchstart', e => {
      e.preventDefault();
      const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
      for (const p of planets) {
        const dx = tx - p.x, dy = ty - p.y;
        if (dx * dx + dy * dy < (p.size + 10) * (p.size + 10)) {
          document.getElementById('iname').textContent = p.e + ' ' + p.name;
          document.getElementById('ifact').textContent = p.fact;
          document.getElementById('info').classList.add('show');
          return;
        }
      }
      document.getElementById('info').classList.remove('show');
    }, { passive: false });

    cv.addEventListener('click', e => {
      for (const p of planets) {
        const dx = e.clientX - p.x, dy = e.clientY - p.y;
        if (dx * dx + dy * dy < (p.size + 10) * (p.size + 10)) {
          document.getElementById('iname').textContent = p.e + ' ' + p.name;
          document.getElementById('ifact').textContent = p.fact;
          document.getElementById('info').classList.add('show');
          return;
        }
      }
      document.getElementById('info').classList.remove('show');
    });

    draw();
  </script>
</body>
</html>
